plugins {
    id "com.android.application"
}

android {
    namespace "br.com.hakozaki.controlegasolina"
    compileSdk 36

    defaultConfig {
        applicationId "br.com.hakozaki.controlegasolina"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

androidComponents {
    onVariants(selector().all()) { variant ->
        variant.outputs.forEach { output ->
            output.outputFileName.set("controle-gasolina-${variant.name}.apk")
        }
    }
}
